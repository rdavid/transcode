---
name: rubocop
'on':
  pull_request:
    paths: &paths
      - '**/*.rb'
      - bin/**
      - .rubocop.yml
      - Gemfile
      - Gemfile.lock
      - Rakefile
      - '*.gemspec'
      - .github/workflows/rubocop.yml
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  rubocop:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      BUNDLE_ONLY: rubocop
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ruby/setup-ruby@v1.313.0
        with:
          ruby-version: 3.2
          bundler-cache: true
      - uses: reviewdog/action-rubocop@v2.22.0
        with:
          reporter: github-pr-review  # Default is github-pr-check
          skip_install: true
          use_bundler: true
