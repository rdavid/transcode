---
name: rake
'on':
  pull_request:
    paths: &paths
      - '**/*.rb'
      - bin/**
      - Gemfile
      - Gemfile.lock
      - Rakefile
      - '*.gemspec'
      - .github/workflows/rake.yml
  push:
    branches: [master]
    paths: *paths
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  rake:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-15-intel
          - ubuntu-22.04
          - ubuntu-24.04
          - windows-2022
          - windows-2025
        ruby:
          - 3.2
          - 3.3
          - 3.4
    name: Rake on ${{ matrix.os }} / Ruby ${{ matrix.ruby }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ruby/setup-ruby@v1.314.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake
